<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page: #f4f4f0;
      --bg-card: #ffffff;
      --bg-secondary: #f1efe8;
      --bg-tertiary: #e8e6df;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-danger: #fcebeb;

      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --text-danger: #a32d2d;

      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);

      --radius-md: 8px;
      --radius-lg: 12px;

      --font-sans: system-ui, -apple-system, sans-serif;
      --font-mono: ui-monospace, 'Cascadia Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page: #1e1e1c;
        --bg-card: #282825;
        --bg-secondary: #323230;
        --bg-tertiary: #2c2c2a;
        --bg-info: #042c53;
        --bg-success: #173404;
        --bg-danger: #501313;

        --text-primary: #f0ede6;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --text-info: #85b7eb;
        --text-success: #97c459;
        --text-danger: #f09595;

        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--bg-info);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon i { font-size: 18px; color: var(--text-info); }

    .brand-name {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .tabs {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.6rem 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -0.5px;
    }

    .tab-btn.active {
      color: var(--text-info);
      border-bottom-color: var(--text-info);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      font-size: 14px;
      font-family: var(--font-sans);
      background: var(--bg-card);
      color: var(--text-primary);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: var(--text-info);
      box-shadow: 0 0 0 3px rgba(24,95,165,0.15);
    }

    .btn-primary {
      width: 100%;
      padding: 0.65rem;
      background: var(--text-info);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1rem 0; font-size: 12px; color: var(--text-tertiary);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 0.5px; background: var(--border);
    }

    .btn-secondary {
      width: 100%;
      padding: 0.6rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--bg-tertiary); }

    .msg {
      font-size: 13px;
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius-md);
      margin-top: 1rem;
      display: none;
      align-items: flex-start;
      gap: 8px;
    }
    .msg.success { background: var(--bg-success); color: var(--text-success); display: flex; }
    .msg.error   { background: var(--bg-danger);  color: var(--text-danger);  display: flex; }

    .url-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 2px 7px;
      border-radius: 4px;
      border: 0.5px solid var(--border);
    }

    .endpoint-hint {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <i class="ti ti-lock"></i>
    </div>
    <span class="brand-name">Minha Aplicação</span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
    <button class="tab-btn" onclick="switchTab('register')">Criar conta</button>
  </div>

  <!-- TAB LOGIN -->
  <div class="tab-content active" id="tab-login">
    <div class="field">
      <label for="login-email">E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="login-senha">Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-primary" id="btn-login" onclick="fazerLogin()">
      <i class="ti ti-arrow-right"></i>
      Entrar
    </button>

    <div class="divider">ou</div>

    <button class="btn-secondary" onclick="fazerRefresh()">
      <i class="ti ti-refresh"></i>
      Renovar sessão (refresh token)
    </button>

    <div class="msg" id="msg-login"></div>

    <div class="endpoint-hint">
      <i class="ti ti-code" style="font-size:14px;"></i>
      <span>Usando <span class="url-tag">POST /login/login</span></span>
    </div>
  </div>

  <!-- TAB CRIAR CONTA -->
  <div class="tab-content" id="tab-register">
    <div class="field">
      <label for="reg-nome">Nome completo</label>
      <input type="text" id="reg-nome" placeholder="João Silva" autocomplete="name" />
    </div>
    <div class="field">
      <label for="reg-email">E-mail</label>
      <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="reg-senha">Senha</label>
      <input type="password" id="reg-senha" placeholder="••••••••" autocomplete="new-password" />
    </div>

    <button class="btn-primary" id="btn-register" onclick="criarConta()">
      <i class="ti ti-user-plus"></i>
      Criar conta
    </button>

    <div class="msg" id="msg-register"></div>

    <div class="endpoint-hint">
      <i class="ti ti-code" style="font-size:14px;"></i>
      <span>Usando <span class="url-tag">POST /login/criar_conta</span></span>
    </div>
  </div>
</div>

<script>
  /* =============================================
     CONFIGURAÇÃO — substitua pela sua URL base
  ============================================= */
  const BASE_URL = "http://127.0.0.1:8000";
  /* ============================================= */

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.innerHTML = `<i class="ti ti-${type === 'success' ? 'circle-check' : 'alert-circle'}"></i><span>${text}</span>`;
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) {
      btn.dataset.original = btn.innerHTML;
      btn.innerHTML = '<i class="ti ti-loader-2" style="animation: spin 1s linear infinite"></i> Aguarde...';
    } else {
      btn.innerHTML = btn.dataset.original || btn.innerHTML;
    }
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    if (!email || !senha) return showMsg('msg-login', 'error', 'Preencha e-mail e senha.');

    setLoading('btn-login', true);
    try {
      const res = await fetch(`${BASE_URL}/login/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Erro ao fazer login.');
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      showMsg('msg-login', 'success', 'Login realizado com sucesso!');
    } catch (e) {
      showMsg('msg-login', 'error', e.message);
    } finally {
      setLoading('btn-login', false);
    }
  }

  async function fazerRefresh() {
    const token = localStorage.getItem('refresh_token');
    if (!token) return showMsg('msg-login', 'error', 'Nenhum refresh token encontrado. Faça login primeiro.');
    try {
      const res = await fetch(`${BASE_URL}/login/refresh`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Erro ao renovar sessão.');
      localStorage.setItem('access_token', data.access_token);
      showMsg('msg-login', 'success', 'Sessão renovada com sucesso!');
    } catch (e) {
      showMsg('msg-login', 'error', e.message);
    }
  }

  async function criarConta() {
    const nome  = document.getElementById('reg-nome').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const senha = document.getElementById('reg-senha').value;
    if (!nome || !email || !senha) return showMsg('msg-register', 'error', 'Preencha todos os campos.');

    setLoading('btn-register', true);
    try {
      const res = await fetch(`${BASE_URL}/login/criar_conta`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Erro ao criar conta.');
      showMsg('msg-register', 'success', data.mensagem || 'Conta criada com sucesso!');
    } catch (e) {
      showMsg('msg-register', 'error', e.message);
    } finally {
      setLoading('btn-register', false);
    }
  }
</script>

</body>
</html>
